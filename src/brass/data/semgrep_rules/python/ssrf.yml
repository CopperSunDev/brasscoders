rules:
  - id: brass.python.taint.ssrf
    mode: taint
    severity: ERROR
    languages: [python]
    message: >-
      Tainted HTTP request data reaches an outbound HTTP/URL fetch. Validate
      the URL against an allowlist (host, scheme, port) before issuing the
      request, or reject schemes other than https.
    metadata:
      category: security
      cwe: "CWE-918"
      brass_kind: ssrf
    pattern-sources:
      - pattern: request.args
      - pattern: request.args.get(...)
      - pattern: request.form
      - pattern: request.form.get(...)
      - pattern: request.json
      - pattern: request.get_json(...)
      - pattern: request.values
      - pattern: request.values.get(...)
      - pattern: request.data
      - pattern: request.GET
      - pattern: request.POST
      - pattern: request.body
      - patterns:
          - pattern-inside: |
              @$APP.route(...)
              def $FUNC(..., $PARAM, ...):
                ...
          - focus-metavariable: $PARAM
      - patterns:
          - pattern-inside: |
              @$APP.route(...)
              def $FUNC($PARAM, ...):
                ...
          - focus-metavariable: $PARAM
      # Django views — only when the request parameter has the HttpRequest
      # type annotation. Without the annotation `request` is too broad.
      - patterns:
          - pattern-inside: |
              def $FUNC($REQ: HttpRequest, ...):
                ...
          - focus-metavariable: $REQ
      - patterns:
          - pattern-inside: |
              def $FUNC($REQ: HttpRequest):
                ...
          - focus-metavariable: $REQ
      # FastAPI / Starlette dependency-injection parameters
      - patterns:
          - pattern-inside: |
              def $FUNC(..., $V = Path(...), ...):
                ...
          - focus-metavariable: $V
      - patterns:
          - pattern-inside: |
              def $FUNC(..., $V = Query(...), ...):
                ...
          - focus-metavariable: $V
      - patterns:
          - pattern-inside: |
              def $FUNC(..., $V = Body(...), ...):
                ...
          - focus-metavariable: $V
      - patterns:
          - pattern-inside: |
              def $FUNC(..., $V = Form(...), ...):
                ...
          - focus-metavariable: $V
    pattern-sinks:
      # focus-metavariable so the sink is the URL, not the whole call.
      # This avoids tainting `requests.post(CONSTANT_URL, json=user_data)`,
      # which is not SSRF — only the body carries taint.
      - patterns:
          - pattern: requests.get($URL, ...)
          - focus-metavariable: $URL
      - patterns:
          - pattern: requests.post($URL, ...)
          - focus-metavariable: $URL
      - patterns:
          - pattern: requests.put($URL, ...)
          - focus-metavariable: $URL
      - patterns:
          - pattern: requests.delete($URL, ...)
          - focus-metavariable: $URL
      - patterns:
          - pattern: requests.request($METHOD, $URL, ...)
          - focus-metavariable: $URL
      - patterns:
          - pattern: urllib.request.urlopen($URL, ...)
          - focus-metavariable: $URL
      - patterns:
          - pattern: urlopen($URL, ...)
          - focus-metavariable: $URL
      - patterns:
          - pattern: httpx.get($URL, ...)
          - focus-metavariable: $URL
      - patterns:
          - pattern: httpx.post($URL, ...)
          - focus-metavariable: $URL
