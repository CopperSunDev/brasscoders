# Documented PyGoat vulnerabilities — or environment-dependent
# detections — that brass does NOT reliably produce under the test
# harness. Listed as aspirational so a future detector improvement
# (or harness improvement that gives bandit/pysa/semgrep full
# coverage) can promote these to required_findings + close the gap
# loudly. Test does NOT fail on these today.
aspirational_findings:
  - file: introduction/views.py
    line: 421
    category: command_injection
    upstream_documents_as: 'OS Command Injection via subprocess shell taint'
    why_not_detected: |
      SemgrepTaintScanner catches this in a direct-shell brasscoders
      scan but produces 0 findings under the test harness. Likely
      a semgrep config / network / env discovery difference in
      the isolated subprocess. Investigate when stabilizing the
      harness for broader scanner coverage.

  - file: introduction/views.py
    line: 155
    category: sql_injection
    upstream_documents_as: 'A01: SQL Injection via string concatenation'
    why_not_detected: |
      Pysa's bundled stdlib.pysa models sqlite3.Cursor.execute as
      a SQL sink, but PyGoat uses Django's ORM cursor which isn't
      in brass's third_party.pysa Django models (only QuerySet.raw
      and CursorWrapper.execute are modeled). Additionally, Pysa
      errored under the harness ('Pyre produced non-parseable
      output even after wipe + retry') — likely cache concurrency
      between the harness's ProcessPoolExecutor workers.

  - file: introduction/views.py
    line: 211
    category: deserialization
    upstream_documents_as: 'A08: Insecure Deserialization via pickle.loads'
    why_not_detected: |
      Bandit B301 should fire on pickle.loads but didn't appear
      under the harness. Same root cause as the bandit gaps at
      L423/L1017 (config-discovery in isolated subprocess).

  - file: introduction/views.py
    line: 451
    category: code_injection
    upstream_documents_as: 'A03: Insecure Design via eval()'
    why_not_detected: |
      Bandit B307 should fire on eval() but didn't appear under
      the harness. Same root cause as the other bandit gaps.
