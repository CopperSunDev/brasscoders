# Expected findings for OWASP PyGoat v2.0.1 at commit
# c11e8429349cc05ff38564d3bf7ef09fb2411874.
#
# Source: brass scan output 2026-05-17. Each entry below is a finding
# brass CURRENTLY detects on this pinned commit; the e2e test asserts
# every required: true entry is present in the scan output. A future
# brass commit that drops one of these signals fails the benchmark
# loudly, with the specific scanner that should have caught it
# annotated for triage.
#
# Aspirational entries (required: false) track documented PyGoat
# vulnerabilities that brass DOESN'T currently detect — pickle.loads
# at L211, eval() at L451, SQL injection by string concat at L155 /
# L855. These don't fail the test today but mark the gap so a future
# brass improvement that adds detection is easy to celebrate.

project: pygoat
upstream: https://github.com/adeyosemanputra/pygoat
pinned_sha: c11e8429349cc05ff38564d3bf7ef09fb2411874
upstream_reference: v2.0.1 release tag
baseline_scan_date: '2026-05-17'

# IMPORTANT: this manifest tracks what brass produces UNDER THE TEST
# HARNESS (HOME-isolated subprocess, BRASS_AUTOFETCH_TYPESHED=1, no
# .brassignore). The test harness's output differs from a direct
# `brasscoders scan` invocation in a developer shell — different scanner
# availability, different cache state, different env. The harness
# output is the canonical baseline because it's reproducible
# across machines; the direct-shell output isn't.
#
# A finding's presence here means brass detected it under harness
# conditions on 2026-05-17 and we want a regression alert if a
# future scan drops it. Findings brass detects in some environments
# but not the harness's belong in `aspirational_findings`.

# Findings the e2e test REQUIRES brass to produce on this commit.
# Dropping any of these in a future scan is a regression signal.
required_findings:
