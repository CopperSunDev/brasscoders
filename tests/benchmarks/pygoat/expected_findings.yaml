    expected_scanner: auth_pattern_analyzer
    vulnerability_class: 'Hardcoded Credentials (CWE-798)'
    notes: |
      brass's AI-auth pattern analyzer reliably catches the
      hardcoded SQL-lab admin password literal here. Stable
      across enriched + heuristic-only + isolated-harness scans.

